<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <meta name="viewport" content="width=420,initial-scale=1">
  <style>
    body {
      background: radial-gradient(circle at 60% 40%, #333 60%, #222 100%);
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Verdana, Geneva, Tahoma, sans-serif;
    }
    .container {
      background: rgba(30,30,30,0.97);
      border-radius: 18px;
      box-shadow: 0 5px 30px #0008;
      padding: 20px;
      display: flex; flex-direction: column; align-items: center;
      min-width: 410px;
    }
    h1 {
      color: #68ff7e;
      margin-bottom: 6px;
      letter-spacing: 2px;
      font-size: 2.1rem;
      font-weight: 600;
      text-shadow: 1px 2px 6px #0008;
    }
    .instructions {
      color: #eee;
      font-size: 1rem;
      margin-bottom: 10px;
      text-align: center;
      opacity: 0.68;
    }
    canvas {
      background: linear-gradient(135deg,#121212,#1e2e24 60%, #1a2d23 100%);
      margin: 0 auto 20px auto;
      border: 3px solid #68ff7e;
      border-radius: 6px;
      box-shadow: 0 2px 13px #000b;
      display: block;
      max-width: 100vw;
      image-rendering: pixelated;
    }
    @media (max-width: 480px) {
      .container { min-width: unset; width: 99vw; padding: 1vw;}
      canvas { width: 96vw; height: 96vw; max-width: 96vw; max-height: 96vw;}
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <h1>Snake Game</h1>
    <div class="instructions" id="instructions" aria-live="polite">
      <span>Use <kbd>Arrow Keys</kbd> to play. <kbd>Space</kbd> to restart.</span>
    </div>
    <canvas id="game" width="400" height="400" tabindex="0" aria-label="Snake game grid"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const gridSize = 20;
    let snake = [{ x: 200, y: 200 }];
    let direction = { x: 0, y: 0 };
    let food = randomFood();
    let score = 0;
    let gameOver = false;
    let moveQueued = false;

    function randomFood() {
      let position;
      while (true) {
        position = {
          x: Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize,
          y: Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize
        };
        if (!snake.some(seg => seg.x === position.x && seg.y === position.y)) break;
      }
      return position;
    }

    function draw() {
      // Background
      ctx.fillStyle = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
      ctx.fillStyle.addColorStop ? (
        ctx.fillStyle.addColorStop(0,"#212a21"),
        ctx.fillStyle.addColorStop(1,"#313a27")
      ) : null;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Food (with border and shadow)
      ctx.save();
      ctx.shadowColor = '#d7331a';
      ctx.shadowBlur = 7;
      ctx.fillStyle = 'orange';
      ctx.beginPath();
      ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2.15, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#9d1505';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      // Snake (head is brighter)
      snake.forEach((seg, i) => {
        ctx.save();
        ctx.fillStyle = i === 0 ? '#53ff68' : '#22ac36';
        ctx.shadowColor = i === 0 ? '#53ff68' : '#14581c';
        ctx.shadowBlur = i === 0 ? 11 : 0;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.rect(seg.x + 1.2, seg.y + 1.2, gridSize-2.4, gridSize-2.4);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      });

      // Draw score (overlay, top right)
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px Segoe UI, Arial';
      ctx.textAlign = 'right';
      ctx.fillText('Score: ' + score, canvas.width - 15, 30);

      if (gameOver) {
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#000';
        ctx.fillRect(20, canvas.height/2-65, canvas.width-40, 120);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#dbd208';
        ctx.lineWidth = 3.5;
        ctx.strokeRect(30, canvas.height/2-55, canvas.width-60, 100);
        ctx.fillStyle = '#fffb8c';
        ctx.font = 'bold 38px Segoe UI, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width/2, canvas.height/2-2);
        ctx.font = '20px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText('Press Space to Restart', canvas.width/2, canvas.height/2+35);
        ctx.restore();
      }
    }

    function update() {
      if (gameOver) return;

      const next = {
        x: snake[0].x + direction.x * gridSize,
        y: snake[0].y + direction.y * gridSize
      };

      // wrap around edges
      if (next.x < 0) next.x = canvas.width - gridSize;
      if (next.x >= canvas.width) next.x = 0;
      if (next.y < 0) next.y = canvas.height - gridSize;
      if (next.y >= canvas.height) next.y = 0;

      // body collision
      if (snake.some(seg => seg.x === next.x && seg.y === next.y)) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(next);

      // Eaten food
      if (next.x === food.x && next.y === food.y) {
        score++;
        food = randomFood();
      } else {
        snake.pop();
      }

      draw();
      moveQueued = false;
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (moveQueued || gameOver && e.key !== ' ') return;

      switch(e.key) {
        case 'ArrowUp':
        case 'w':
          if (direction.y === 0) { direction = { x: 0, y: -1 }; moveQueued = true; }
          break;
        case 'ArrowDown':
        case 's':
          if (direction.y === 0) { direction = { x: 0, y: 1 }; moveQueued = true; }
          break;
        case 'ArrowLeft':
        case 'a':
          if (direction.x === 0) { direction = { x: -1, y: 0 }; moveQueued = true; }
          break;
        case 'ArrowRight':
        case 'd':
          if (direction.x === 0) { direction = { x: 1, y: 0 }; moveQueued = true; }
          break;
        case ' ':
          if (gameOver) restart();
          break;
      }
    });

    function restart() {
      snake = [{ x: 200, y: 200 }];
      direction = { x: 0, y: 0 };
      score = 0;
      food = randomFood();
      gameOver = false;
      draw();
    }

    // Focus canvas for keyboard on click/tap
    canvas.addEventListener('click', ()=>canvas.focus());

    // Mobile swipe gesture for controls
    let touchStartX = null, touchStartY = null;
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1)
        [touchStartX, touchStartY] = [e.touches[0].clientX, e.touches[0].clientY];
    });
    canvas.addEventListener('touchend', e => {
      if (!touchStartX || !touchStartY) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        // horizontal
        if (dx < -10 && direction.x === 0) { direction = { x: -1, y: 0 }; }
        else if (dx > 10 && direction.x === 0) { direction = { x: 1, y: 0 }; }
      } else {
        // vertical
        if (dy < -10 && direction.y === 0) { direction = { x: 0, y: -1 }; }
        else if (dy > 10 && direction.y === 0) { direction = { x: 0, y: 1 }; }
      }
      touchStartX = touchStartY = null;
    });

    // Start moving automatically after key or swipe
    let started = false;
    setInterval(() => {
      if (!started && (direction.x !== 0 || direction.y !== 0)) started = true;
      if (started) update();
      else draw();
    }, 100);

    draw();
  </script>
</body>
</html>
