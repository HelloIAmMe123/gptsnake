<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basic Snake Game</title>
  <style>
    body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #111; display: block; margin: auto; border: 2px solid #fff; }
    h2 { color: #fff; text-align: center; }
  </style>
</head>
<body>
  <div>
    <h2>Snake Game (Use Arrow Keys)</h2>
    <canvas id="game" width="400" height="400"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const gridSize = 20;
    let snake = [{ x: 200, y: 200 }];
    let direction = { x: 0, y: 0 };
    let food = randomFood();
    let score = 0;
    let gameOver = false;
    let moveQueued = false;

    function randomFood() {
      let position;
      while (true) {
        position = {
          x: Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize,
          y: Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize
        };
        // make sure food does not spawn on the snake
        if (!snake.some(seg => seg.x === position.x && seg.y === position.y)) break;
      }
      return position;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // draw food
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x, food.y, gridSize, gridSize);

      // draw snake
      ctx.fillStyle = 'lime';
      snake.forEach((seg, i) => {
        ctx.fillRect(seg.x, seg.y, gridSize, gridSize);
      });

      // draw score
      ctx.fillStyle = 'white';
      ctx.font = '18px Arial';
      ctx.fillText('Score: ' + score, 10, 20);

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, canvas.height/2-40, canvas.width, 80);
        ctx.fillStyle = 'yellow';
        ctx.font = '36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
        ctx.font = '20px Arial';
        ctx.fillText('Press Space to Restart', canvas.width/2, canvas.height/2 + 32);
        ctx.textAlign = 'left';
      }
    }

    function update() {
      if (gameOver) return;

      // move the snake
      const next = {
        x: snake[0].x + direction.x * gridSize,
        y: snake[0].y + direction.y * gridSize
      };

      // wrap around edges
      if (next.x < 0) next.x = canvas.width - gridSize;
      if (next.x >= canvas.width) next.x = 0;
      if (next.y < 0) next.y = canvas.height - gridSize;
      if (next.y >= canvas.height) next.y = 0;

      // check collision with body
      if (snake.some(seg => seg.x === next.x && seg.y === next.y)) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(next);

      // check if food eaten
      if (next.x === food.x && next.y === food.y) {
        score++;
        food = randomFood();
      } else {
        snake.pop();
      }

      draw();
      moveQueued = false;
    }

    document.addEventListener('keydown', e => {
      if (moveQueued) return; // prevent changing direction twice per frame
      switch(e.key) {
        case 'ArrowUp':
          if (direction.y === 0) { direction = { x: 0, y: -1 }; moveQueued = true; }
          break;
        case 'ArrowDown':
          if (direction.y === 0) { direction = { x: 0, y: 1 }; moveQueued = true; }
          break;
        case 'ArrowLeft':
          if (direction.x === 0) { direction = { x: -1, y: 0 }; moveQueued = true; }
          break;
        case 'ArrowRight':
          if (direction.x === 0) { direction = { x: 1, y: 0 }; moveQueued = true; }
          break;
        case ' ':
          if (gameOver) restart();
          break;
      }
    });

    function restart() {
      snake = [{ x: 200, y: 200 }];
      direction = { x: 0, y: 0 };
      score = 0;
      food = randomFood();
      gameOver = false;
      draw();
    }

    // Start moving automatically after the first key press
    let started = false;
    setInterval(() => {
      if (!started && (direction.x !== 0 || direction.y !== 0)) started = true;
      if (started) update();
      else draw();
    }, 100);

    draw();
  </script>
</body>
</html>
